<!DOCTYPE html>
<html>
<head>
    <title>Deepak Bhai Shop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🛒 Deepak Bhai Shop</h1>
    <input type="text" placeholder="Search products...">
</header>

<div class="categories">
    <button>Fashion</button>
    <button>Mobile</button>
    <button>Shoes</button>
    <button>Beauty</button>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Stylish Shirt</h3>
        <p>₹499</p>
        <button onclick="order()">Order Now</button>
    </div>

    <div class="card">
        <img src="https://i.imgur.com/TERA-LINK-YAHA.jpg" alt="Stylish Shirt" style="width:200px; height:200px;">
        <h3>Smart Watch</h3>
        <p>₹999</p>
        <button onclick="order()">Order Now</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
