<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepak Bhai Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <div class="user-info" onclick="openModal('signupModal')">
            <i class="fa-solid fa-circle-user avatar"></i>
            <div><span class="welcome-text">Welcome back,</span><h3 class="shop-title">Deepak Bhai Shop</h3></div>
        </div>
        <div class="header-icons">
            <div class="cart-icon-wrap" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping"></i><span id="cartCount" class="badge">0</span>
            </div>
        </div>
    </header>

    <!-- Banner -->
    <div class="promo-banner">
        <h2>🔥 Mega Sale: Upto 50% OFF!</h2>
        <p>Free Delivery on all orders</p>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search..." oninput="searchProducts()">
        </div>
    </div>

    <main class="products-grid" id="productsContainer"></main>

    <!-- Footer -->
    <footer><p>© 2026 Deepak Bhai Shop | Trusted by Millions</p></footer>

    <!-- Modals (Quick View & Login) -->
    <div id="detailModal" class="modal"><div class="modal-content-card" id="detailContent"></div></div>
    <div id="signupModal" class="modal"><div class="modal-content-card">... (Login Code same rakhein) ...</div></div>

    <script src="script.js"></script>
</body>
</html>
