<!-- 1. Browser Tab Title Change Karein -->
<title>Deepak Bhai Shop</title>

<!-- 2. Logo / Header Name Change Karein -->
<header class="navbar">
    <div class="logo">Deepak Bhai Shop</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products in Deepak Bhai Shop..." onkeyup="searchProducts()">
    </div>
    <div class="nav-buttons">
        <button id="loginBtn" onclick="openModal('signupModal')">Sign In</button>
        <button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
    </div>
</header>

<!-- 3. Banner Name Change Karein -->
<div class="banner">
    <h2>Welcome to Deepak Bhai Shop - Best Deals Everyday!</h2>
</div>
