<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepak Bhai Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header Section -->
    <header class="top-header">
        <div class="user-info">
            <i class="fa-solid fa-circle-user avatar"></i>
            <div>
                <span class="welcome-text">Welcome back,</span>
                <h3 class="shop-title">Deepak Bhai Shop</h3>
            </div>
        </div>
        <div class="header-icons">
            <i class="fa-regular fa-bell"></i>
            <i class="fa-regular fa-heart"></i>
            <div class="cart-icon-wrap" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartCount" class="badge">0</span>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search in Deepak Bhai Shop..." onkeyup="searchProducts()">
            <i class="fa-solid fa-microphone mic-icon"></i>
            <i class="fa-solid fa-camera camera-icon"></i>
        </div>
    </div>

    <!-- Categories Scroll Horizontal -->
    <div class="categories-scroll">
        <div class="cat-item"><div class="cat-circle"><i class="fa-solid fa-border-all"></i></div><span>All Categories</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fa-solid fa-shirt"></i></div><span>Kurtis & Sets</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fa-solid fa-child"></i></div><span>Kids</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fa-solid fa-couch"></i></div><span>Home</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fa-solid fa-wand-magic-sparkles"></i></div><span>Beauty</span></div>
        <div class="cat-item"><div class="cat-circle"><i class="fa-solid fa-gem"></i></div><span>Jewellery</span></div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <button><i class="fa-solid fa-arrow-up-wide-short"></i> Sort</button>
        <button>Category <i class="fa-solid fa-angle-down"></i></button>
        <button>Gender <i class="fa-solid fa-angle-down"></i></button>
        <button><i class="fa-solid fa-sliders"></i> Filters</button>
    </div>

    <!-- Product Grid -->
    <main class="products-grid" id="productsContainer">
        <!-- Products Script se load honge -->
    </main>

    <!-- Bottom Navigation Bar (Meesho Style) -->
    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item"><i class="fa-solid fa-list"></i><span>Categories</span></div>
        <div class="nav-item"><i class="fa-solid fa-store"></i><span>Mall</span></div>
        <div class="nav-item" onclick="openModal('signupModal')"><i class="fa-solid fa-user"></i><span id="navUserText">Profile</span></div>
    </nav>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2>My Cart</h2>
            <div id="cartItems"></div>
            <hr>
            <h3>Total Amount: ₹<span id="cartTotal">0</span></h3>
            <button class="btn-checkout" onclick="checkout()">Place Order</button>
        </div>
    </div>

    <!-- Sign-Up Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('signupModal')">&times;</span>
            <h2>Sign Up / Login</h2>
            <input type="text" id="userName" placeholder="Enter Full Name"><br><br>
            <input type="text" id="userMobile" placeholder="Enter Phone Number"><br><br>
            <button class="btn-checkout" onclick="saveUser()">Continue</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
