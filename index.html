<<!DOCTYPE html>
<html>
<head>
<title>Deepak Bhai Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#ff3f6c;
    color:white;
    padding:15px;
    text-align:center;
    font-size:25px;
    font-weight:bold;
}

.search{
    margin:15px;
    padding:12px;
    width:90%;
    border-radius:20px;
    border:1px solid #ddd;
}

.menu{
    display:flex;
    justify-content:space-around;
    background:white;
    padding:15px;
}

.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:15px;
}

.card{
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

button{
    background:#ff3f6c;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
}

</style>

</head>

<body>

<header>
🛒 Deepak Bhai Shop
</header>

<input class="search" placeholder="Search products...">

<div class="menu">
<span>Home</span>
<span>Category</span>
<span>Cart 🛒</span>
<span>Profile</span>
</div>


<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Stylish Shirt</h3>
<p>₹499</p>
<button>Add Cart</button>
</div>


<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Women Dress</h3>
<p>₹699</p>
<button>Add Cart</button>
</div>


<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Shoes</h3>
<p>₹999</p>
<button>Add Cart</button>
</div>


<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mobile Cover</h3>
<p>₹199</p>
<button>Add Cart</button>
</div>


</div>

</body>
</html>
