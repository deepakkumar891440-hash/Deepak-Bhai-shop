<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepak BHAI shop</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            meesho: '#9c1c5c',
            meeshoLight: '#fdecf4',
            meeshoDark: '#781346',
            meeshoGreen: '#038d63'
          }
        }
      }
    }
  </script>

  <style>
    /* Scrollbar Hiding */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-100 font-sans">

  <!-- 1. SPLASH SCREEN (LOGO & WELCOME) -->
  <div id="splash-screen" class="fixed inset-0 bg-meesho z-50 flex flex-col items-center justify-center text-white transition-opacity duration-700">
    <div class="w-24 h-24 bg-white text-meesho rounded-3xl flex items-center justify-center text-5xl font-black shadow-2xl mb-6 animate-bounce">
      DB
    </div>
    <h1 class="text-3xl font-extrabold tracking-wide mb-2 text-white">Deepak BHAI shop</h1>
    <p class="text-base font-medium text-pink-100 animate-pulse">Welcome to Deepak BHAI shop</p>
  </div>

  <!-- 2. MAIN APP SCREEN -->
  <div id="app" class="max-w-md mx-auto bg-white min-h-screen pb-20 border shadow-xl relative hidden">

    <!-- Header Bar -->
    <div class="bg-white px-3 py-2.5 flex items-center justify-between border-b sticky top-0 z-30">
      <div class="flex items-center space-x-2">
        <div onclick="openLoginModal()" class="w-9 h-9 rounded-full bg-meeshoLight text-meesho border border-meesho/30 font-black flex items-center justify-center text-sm cursor-pointer shadow-sm active:scale-95 transition" title="Profile / Login">
          DB
        </div>
        <button onclick="showMessage('Refer & Earn Active!')" class="bg-pink-50 border border-pink-200 text-meesho text-xs font-semibold px-2.5 py-1 rounded-full flex items-center gap-1 active:scale-95 transition">
          🎁 Refer and Earn
        </button>
      </div>
      <div class="flex items-center space-x-4 text-gray-700 text-lg">
        <i onclick="showMessage('Wishlist section')" class="fa-regular fa-heart cursor-pointer hover:text-meesho transition"></i>
        <div onclick="showMessage('Showcase Only: Buying disabled')" class="relative cursor-pointer">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="absolute -top-2 -right-2 bg-meesho text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>
        </div>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white px-3 py-2 border-b">
      <div class="flex items-center bg-white border border-gray-300 rounded-lg px-3 py-2 text-gray-500 shadow-sm">
        <i class="fa-solid fa-magnifying-glass mr-2 text-gray-400"></i>
        <input id="search-input" type="text" onkeyup="filterProducts()" placeholder="Search by Keyword or Product ID" class="w-full bg-transparent text-sm focus:outline-none text-gray-800" />
        <i onclick="showMessage('Voice Search Working!')" class="fa-solid fa-microphone mx-2 cursor-pointer text-gray-400 hover:text-meesho"></i>
        <i onclick="showMessage('Camera Search Working!')" class="fa-solid fa-camera cursor-pointer text-gray-400 hover:text-meesho"></i>
      </div>
    </div>

    <!-- Category Slider -->
    <div class="bg-white py-3 px-2 overflow-x-auto border-b no-scrollbar flex space-x-3" id="category-container"></div>

    <!-- Filters Bar -->
    <div class="bg-white py-2 px-3 flex items-center justify-between text-xs font-semibold text-gray-700 border-b">
      <button onclick="showMessage('Sort Options')" class="flex items-center gap-1 hover:text-meesho">⇅ Sort</button>
      <button onclick="showMessage('Category Selected')" class="flex items-center gap-1 hover:text-meesho">Category ▾</button>
      <button onclick="showMessage('Gender Selected')" class="flex items-center gap-1 hover:text-meesho">Gender ▾</button>
      <button onclick="showMessage('Filters Opened')" class="flex items-center gap-1 hover:text-meesho"><i class="fa-solid fa-filter text-[10px]"></i> Filters</button>
    </div>

    <!-- Products Grid -->
    <div class="p-2 grid grid-cols-2 gap-2 bg-gray-100" id="product-grid"></div>

    <!-- Floating Banner -->
    <div onclick="showMessage('Refer & Earn ₹100 Instant Cash!')" class="fixed bottom-16 right-3 z-20 w-44 bg-amber-400 rounded-xl p-2 shadow-2xl border-2 border-amber-300 cursor-pointer active:scale-95 transition">
      <div class="text-center font-black text-amber-950 text-[11px] tracking-wide">REFER & EARN</div>
      <div class="bg-meesho text-yellow-300 text-center text-[10px] font-extrabold rounded py-0.5 mt-1 shadow-sm">₹100 INSTANT CASH</div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around py-1.5 text-gray-500 z-30">
      <div onclick="navClick('Home')" class="flex flex-col items-center text-meesho font-bold text-[10px] cursor-pointer">
        <i class="fa-solid fa-house text-lg"></i>
        <span>Home</span>
      </div>
      <div onclick="navClick('Categories')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-table-cells-large text-lg"></i>
        <span>Categories</span>
      </div>
      <div onclick="navClick('Mall')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-store text-lg"></i>
        <span>Mall</span>
      </div>
      <div onclick="navClick('Video Finds')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-circle-play text-lg"></i>
        <span>Video Finds</span>
      </div>
      <div onclick="navClick('My Orders')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-box text-lg"></i>
        <span>My Orders</span>
      </div>
    </div>

  </div>

  <!-- 3. LOGIN / PROFILE MODAL -->
  <div id="login-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-2xl p-5 relative shadow-2xl animate-fade-in">
      <button onclick="closeLoginModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 text-lg">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    let currentUser = null;

    const categories = [
      { name: "All Categories", img: "https://picsum.photos/100?random=1" },
      { name: "Kurtis & Suits", img: "https://picsum.photos/100?random=2" },
      { name: "Kids", img: "https://picsum.photos/100?random=3" },
      { name: "Home", img: "https://picsum.photos/100?random=4" },
      { name: "Beauty", img: "https://picsum.photos/100?random=5" },
      { name: "Saree", img: "https://picsum.photos/100?random=6" },
      { name: "Western Wear", img: "https://picsum.photos/100?random=7" },
      { name: "Jewellery", img: "https://picsum.photos/100?random=8" }
    ];

    const products = [
      { id: 1, name: "Charvi Voguish Sarees", price: "₹451", offer: "₹421 with 1 Special Offer", rating: "4.2", reviews: "5,991", image: "https://picsum.photos/300/400?random=21", isAd: false },
      { id: 2, name: "Banita Ensemble Sarees", price: "₹546", offer: "₹485 with 1 Special Offer", rating: "4.4", reviews: "1,200", image: "https://picsum.photos/300/400?random=22", isAd: true },
      { id: 3, name: "Designer Printed Suit", price: "₹699", offer: "₹649 with Offer", rating: "4.5", reviews: "3,410", image: "https://picsum.photos/300/400?random=23", isAd: false },
      { id: 4, name: "Trendy Top & Jeans", price: "₹299", offer: "₹250 with Offer", rating: "4.1", reviews: "890", image: "https://picsum.photos/300/400?random=24", isAd: false }
    ];

    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const splash = document.getElementById("splash-screen");
        const app = document.getElementById("app");
        splash.classList.add("opacity-0");
        setTimeout(() => {
          splash.style.display = "none";
          app.classList.remove("hidden");
        }, 700);
      }, 2500);

      renderCategories();
      renderProducts(products);
    });

    function renderCategories() {
      const container = document.getElementById("category-container");
      container.innerHTML = categories.map(cat => `
        <div onclick="showMessage('Category: ${cat.name}')" class="flex flex-col items-center min-w-[65px] text-center cursor-pointer active:scale-95 transition">
          <div class="w-14 h-14 rounded-full bg-pink-100 overflow-hidden border border-pink-200 p-0.5">
            <img src="${cat.img}" alt="${cat.name}" class="w-full h-full object-cover rounded-full" />
          </div>
          <span class="text-[11px] text-gray-700 font-medium mt-1 truncate w-16">${cat.name}</span>
        </div>
      `).join('');
    }

    function renderProducts(items) {
      const grid = document.getElementById("product-grid");
      if(items.length === 0) {
        grid.innerHTML = `<p class="col-span-2 text-center text-gray-500 py-6">Koi product nahi mila!</p>`;
        return;
      }
      grid.innerHTML = items.map(item => `
        <div onclick="openProductDetails('${item.name}', '${item.price}')" class="bg-white rounded-md border overflow-hidden relative shadow-sm cursor-pointer hover:shadow-md transition">
          <div class="relative">
            <img src="${item.image}" alt="${item.name}" class="w-full h-48 object-cover" />
            <button onclick="event.stopPropagation(); toggleHeart(this)" class="absolute top-2 right-2 bg-white/80 p-1.5 rounded-full shadow hover:bg-white active:scale-90 transition">
              <i class="fa-regular fa-heart text-gray-600 text-xs"></i>
            </button>
          </div>
          <div class="p-2">
            <span class="text-xs text-gray-600 font-medium block truncate">
              ${item.isAd ? '<span class="bg-gray-200 text-gray-700 text-[9px] px-1 rounded mr-1 font-bold">Ad</span>' : ''}
              ${item.name}
            </span>
            <div class="text-base font-bold text-gray-900 mt-0.5">${item.price}</div>
            <div class="text-[10px] text-meeshoGreen font-semibold bg-emerald-50 px-1 py-0.5 rounded w-max mt-1">
              ${item.offer}
            </div>
            <div class="flex items-center mt-2 space-x-1">
              <span class="bg-meeshoGreen text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full flex items-center gap-0.5">
                ${item.rating} <i class="fa-solid fa-star text-[8px]"></i>
              </span>
              <span class="text-[10px] text-gray-400">(${item.reviews})</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openProductDetails(name, price) {
      alert(`📦 Product: ${name}\n💰 Price: ${price}\n\n⚠️ Notice: Yeh website sirf showcase ke liye hai. Yahan se khareeda nahi ja sakta.`);
    }

    function filterProducts() {
      const query = document.getElementById("search-input").value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(query));
      renderProducts(filtered);
    }

    function toggleHeart(btn) {
      const icon = btn.querySelector('i');
      if(icon.classList.contains('fa-regular')) {
        icon.classList.remove('fa-regular', 'text-gray-600');
        icon.classList.add('fa-solid', 'text-meesho');
        showMessage('Saved to Wishlist!');
      } else {
        icon.classList.remove('fa-solid', 'text-meesho');
        icon.classList.add('fa-regular', 'text-gray-600');
        showMessage('Removed from Wishlist!');
      }
    }

    function openLoginModal() {
      const modal = document.getElementById("login-modal");
      const content = document.getElementById("modal-content");

      if(currentUser) {
        content.innerHTML = `
          <div class="text-center">
            <div class="w-16 h-16 bg-meesho text-white font-extrabold text-2xl rounded-full flex items-center justify-center mx-auto mb-3 shadow">
              ${currentUser.name.charAt(0).toUpperCase()}
            </div>
            <h2 class="text-lg font-bold text-gray-800">Hello, ${currentUser.name}!</h2>
            <p class="text-xs text-gray-500 mb-4">${currentUser.phone}</p>
            <div class="bg-pink-50 text-meesho text-xs font-semibold p-2 rounded-lg mb-4">
              Deepak BHAI shop Member
            </div>
            <button onclick="logoutUser()" class="w-full bg-red-500 text-white font-semibold py-2 rounded-lg text-sm hover:bg-red-600 transition">Logout</button>
          </div>
        `;
      } else {
        content.innerHTML = `
          <div class="text-center mb-4">
            <h2 class="text-xl font-bold text-meesho">Deepak BHAI shop</h2>
            <p class="text-xs text-gray-500 mt-1">Sign Up / Login to Profile</p>
          </div>
          <form onsubmit="handleLogin(event)" class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Your Name</label>
              <input id="login-name" type="text" placeholder="Enter name" required class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-meesho" />
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Mobile Number</label>
              <input id="login-phone" type="tel" placeholder="10-digit number" required pattern="[0-9]{10}" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-meesho" />
            </div>
            <button type="submit" class="w-full bg-meesho text-white font-bold py-2 rounded-lg text-sm hover:bg-meeshoDark transition">Login / Continue</button>
          </form>
        `;
      }
      modal.classList.remove("hidden");
    }

    function closeLoginModal() {
      document.getElementById("login-modal").classList.add("hidden");
    }

    function handleLogin(e) {
      e.preventDefault();
      const name = document.getElementById("login-name").value;
      const phone = document.getElementById("login-phone").value;
      currentUser = { name, phone };
      closeLoginModal();
      alert(`Welcome ${name}! Aapka Deepak BHAI shop me login ho gaya hai.`);
    }

    function logoutUser() {
      currentUser = null;
      closeLoginModal();
      alert("Logout successful!");
    }

    function showMessage(msg) { alert(msg); }
    function navClick(section) { alert(`Navigating to ${section}...`); }
  </script>
</body>
</html>
