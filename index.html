<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepak Bhai Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header Section -->
    <header class="top-header">
        <div class="user-info" onclick="openModal('signupModal')">
            <i class="fa-solid fa-circle-user avatar"></i>
            <div>
                <span class="welcome-text">Welcome back,</span>
                <h3 class="shop-title">Deepak Bhai Shop</h3>
            </div>
        </div>
        <div class="header-icons">
            <i class="fa-regular fa-bell" onclick="alert('No new notifications!')"></i>
            <i class="fa-regular fa-heart" onclick="alert('Wishlist is empty!')"></i>
            <div class="cart-icon-wrap" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartCount" class="badge">0</span>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search in Deepak Bhai Shop..." oninput="searchProducts()">
            <i class="fa-solid fa-microphone mic-icon" onclick="alert('Voice search activated!')"></i>
            <i class="fa-solid fa-camera camera-icon" onclick="alert('Image search activated!')"></i>
        </div>
    </div>

    <!-- Categories Scroll -->
    <div class="categories-scroll">
        <div class="cat-item" onclick="filterByCategory('All')"><div class="cat-circle"><i class="fa-solid fa-border-all"></i></div><span>All</span></div>
        <div class="cat-item" onclick="filterByCategory('Saree')"><div class="cat-circle"><i class="fa-solid fa-shirt"></i></div><span>Saree</span></div>
        <div class="cat-item" onclick="filterByCategory('Kurtis')"><div class="cat-circle"><i class="fa-solid fa-vest"></i></div><span>Kurtis</span></div>
        <div class="cat-item" onclick="filterByCategory('Kids')"><div class="cat-circle"><i class="fa-solid fa-child"></i></div><span>Kids</span></div>
        <div class="cat-item" onclick="filterByCategory('Electronics')"><div class="cat-circle"><i class="fa-solid fa-headphones"></i></div><span>Electronics</span></div>
        <div class="cat-item" onclick="filterByCategory('Jewellery')"><div class="cat-circle"><i class="fa-solid fa-gem"></i></div><span>Jewellery</span></div>
        <div class="cat-item" onclick="filterByCategory('Shoes')"><div class="cat-circle"><i class="fa-solid fa-shoe-prints"></i></div><span>Shoes</span></div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <button onclick="sortProducts('low-high')"><i class="fa-solid fa-arrow-up-wide-short"></i> Price Low</button>
        <button onclick="sortProducts('high-low')"><i class="fa-solid fa-arrow-down-wide-short"></i> Price High</button>
        <button onclick="alert('Filter menu opened!')"><i class="fa-solid fa-sliders"></i> Filters</button>
    </div>

    <!-- Product Grid -->
    <main class="products-grid" id="productsContainer"></main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="filterByCategory('All')"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="alert('Category View Opened')"><i class="fa-solid fa-list"></i><span>Categories</span></div>
        <div class="nav-item" onclick="alert('Deepak Mall Opened')"><i class="fa-solid fa-store"></i><span>Mall</span></div>
        <div class="nav-item" onclick="openModal('signupModal')"><i class="fa-solid fa-user"></i><span id="navUserText">Profile</span></div>
    </nav>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content-card">
            <span class="close-card" onclick="toggleCart()">&times;</span>
            <h2 class="card-title">Your Cart</h2>
            <div id="cartItems"></div>
            <br>
            <h3>Total: ₹<span id="cartTotal">0</span></h3>
            <button class="btn-card-login" onclick="checkout()">Place Order</button>
        </div>
    </div>

    <!-- Friend Style Login Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content-card">
            <span class="close-card" onclick="closeModal('signupModal')">&times;</span>
            <h2 class="card-title">Welcome back</h2>
            <p class="card-subtitle">Enter your email and password to access your account</p>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="m.dhoni@example.com">
            </div>
            
            <div class="input-group">
                <div class="label-row">
                    <label>Password</label>
                    <a href="#" class="forgot-pass" onclick="alert('Reset link sent!')">Forgot password?</a>
                </div>
                <input type="password" id="userPassword" placeholder="••••••••">
            </div>
            
            <button class="btn-card-login" onclick="saveUser()">Login to your account</button>
            <p class="card-footer-text">Don't have an account? <span class="signup-link" onclick="alert('Sign up link clicked!')">Sign up</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
