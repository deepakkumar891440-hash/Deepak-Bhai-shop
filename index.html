<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepak BHAI shop</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Custom Style -->
  <link rel="stylesheet" href="style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            meesho: '#9c1c5c',
            meeshoLight: '#fdecf4',
            meeshoDark: '#781346',
            meeshoGreen: '#038d63'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- ================= 1. SPLASH SCREEN (LOGO & WELCOME) ================= -->
  <div id="splash-screen" class="fixed inset-0 bg-meesho z-50 flex flex-col items-center justify-center text-white transition-opacity duration-700">
    <div class="w-24 h-24 bg-white text-meesho rounded-3xl flex items-center justify-center text-5xl font-black shadow-2xl mb-6 animate-bounce">
      DB
    </div>
    <h1 class="text-3xl font-extrabold tracking-wide mb-2 text-white">Deepak BHAI shop</h1>
    <p class="text-base font-medium text-pink-100 animate-pulse">Welcome to Deepak BHAI shop</p>
  </div>

  <!-- ================= 2. MAIN APP SCREEN ================= -->
  <div id="app" class="max-w-md mx-auto bg-white min-h-screen pb-20 border shadow-xl relative hidden">

    <!-- Header Bar -->
    <div class="bg-white px-3 py-2.5 flex items-center justify-between border-b sticky top-0 z-30">
      <div class="flex items-center space-x-2">
        <!-- Profile / Logo Icon -->
        <div onclick="openLoginModal()" class="w-9 h-9 rounded-full bg-meeshoLight text-meesho border border-meesho/30 font-black flex items-center justify-center text-sm cursor-pointer shadow-sm active:scale-95 transition" title="Profile / Login">
          DB
        </div>
        <button onclick="showMessage('Refer & Earn Active!')" class="bg-pink-50 border border-pink-200 text-meesho text-xs font-semibold px-2.5 py-1 rounded-full flex items-center gap-1 active:scale-95 transition">
          🎁 Refer and Earn
        </button>
      </div>
      <div class="flex items-center space-x-4 text-gray-700 text-lg">
        <i onclick="showMessage('Wishlist section')" class="fa-regular fa-heart cursor-pointer hover:text-meesho transition"></i>
        <div onclick="showMessage('Showcase Only: Buying disabled')" class="relative cursor-pointer">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="absolute -top-2 -right-2 bg-meesho text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>
        </div>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white px-3 py-2 border-b">
      <div class="flex items-center bg-white border border-gray-300 rounded-lg px-3 py-2 text-gray-500 shadow-sm">
        <i class="fa-solid fa-magnifying-glass mr-2 text-gray-400"></i>
        <input id="search-input" type="text" onkeyup="filterProducts()" placeholder="Search by Keyword or Product ID" class="w-full bg-transparent text-sm focus:outline-none text-gray-800" />
        <i onclick="showMessage('Voice Search Working!')" class="fa-solid fa-microphone mx-2 cursor-pointer text-gray-400 hover:text-meesho"></i>
        <i onclick="showMessage('Camera Search Working!')" class="fa-solid fa-camera cursor-pointer text-gray-400 hover:text-meesho"></i>
      </div>
    </div>

    <!-- Horizontal Category Slider -->
    <div class="bg-white py-3 px-2 overflow-x-auto border-b no-scrollbar flex space-x-3" id="category-container">
      <!-- Categories via JS -->
    </div>

    <!-- Filters Bar -->
    <div class="bg-white py-2 px-3 flex items-center justify-between text-xs font-semibold text-gray-700 border-b">
      <button onclick="showMessage('Sort Options')" class="flex items-center gap-1 hover:text-meesho">⇅ Sort</button>
      <button onclick="showMessage('Category Selected')" class="flex items-center gap-1 hover:text-meesho">Category ▾</button>
      <button onclick="showMessage('Gender Selected')" class="flex items-center gap-1 hover:text-meesho">Gender ▾</button>
      <button onclick="showMessage('Filters Opened')" class="flex items-center gap-1 hover:text-meesho"><i class="fa-solid fa-filter text-[10px]"></i> Filters</button>
    </div>

    <!-- Products Grid -->
    <div class="p-2 grid grid-cols-2 gap-2 bg-gray-100" id="product-grid">
      <!-- Products via JS -->
    </div>

    <!-- Floating Overlay Banner (Refer & Earn) -->
    <div onclick="showMessage('Refer & Earn ₹100 Instant Cash!')" class="fixed bottom-16 right-3 z-20 w-44 bg-amber-400 rounded-xl p-2 shadow-2xl border-2 border-amber-300 cursor-pointer active:scale-95 transition">
      <div class="text-center font-black text-amber-950 text-[11px] tracking-wide">
        REFER & EARN
      </div>
      <div class="bg-meesho text-yellow-300 text-center text-[10px] font-extrabold rounded py-0.5 mt-1 shadow-sm">
        ₹100 INSTANT CASH
      </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t flex justify-around py-1.5 text-gray-500 z-30">
      <div onclick="navClick('Home')" class="flex flex-col items-center text-meesho font-bold text-[10px] cursor-pointer">
        <i class="fa-solid fa-house text-lg"></i>
        <span>Home</span>
      </div>
      <div onclick="navClick('Categories')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-table-cells-large text-lg"></i>
        <span>Categories</span>
      </div>
      <div onclick="navClick('Mall')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-store text-lg"></i>
        <span>Mall</span>
      </div>
      <div onclick="navClick('Video Finds')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-circle-play text-lg"></i>
        <span>Video Finds</span>
      </div>
      <div onclick="navClick('My Orders')" class="flex flex-col items-center text-[10px] hover:text-meesho cursor-pointer">
        <i class="fa-solid fa-box text-lg"></i>
        <span>My Orders</span>
      </div>
    </div>

  </div>

  <!-- ================= 3. USER-FRIENDLY LOGIN / PROFILE MODAL ================= -->
  <div id="login-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white w-full max-w-sm rounded-2xl p-5 relative shadow-2xl animate-fade-in">
      <button onclick="closeLoginModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 text-lg">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div id="modal-content">
        <!-- Content via JS -->
      </div>
    </div>
  </div>

  <!-- Custom Script -->
  <script src="script.js"></script>
</body>
</html>
